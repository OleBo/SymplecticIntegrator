name: Build and Deploy
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set up Python 🐍
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install JupyterLite 🛠️
        run: |
          pip install jupyterlite jupyterlab jupyterlite-pyodide-kernel numpy scipy sympy matplotlib

      - name: Build JupyterLite 🏗️
        run: |
          # Builds notebooks from your /docs/notebooks folder into a /dist directory
          jupyter lite build --contents docs/notebooks --output-dir dist/lite

      - name: Set up Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Quote version numbers to ensure correct parsing
          bundler-cache: true # Recommended: automatically runs 'bundle install' and caches gems

      - name: Build Jekyll 🧪
        run: |
          # Move into the docs folder where the Gemfile is located
          cd docs
          bundle install
          # Build the site into the dist directory at the root level
          # The --no-clean flag is vital so it doesn't delete the /lite folder 
          # created in the previous step
          bundle exec jekyll build --destination ../dist --no-clean
          # Important: tells GitHub NOT to run Jekyll a second time on the server
          touch ../dist/.nojekyll 

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Deploys the combined output
          branch: gh-pages