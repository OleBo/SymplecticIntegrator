name: Build and Deploy JupyterLite

on:
  push:
    branches:
      - main
    paths:
      - 'docs/notebooks/**'    # Trigger only when files in notebooks/ change
      - '.github/workflows/**' # Allow workflow updates to trigger too
  workflow_dispatch:          # Allow manual triggering

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install JupyterLite and dependencies
        run: |
          pip install jupyterlite jupyterlab jupyterlite-pyodide-kernel numpy scipy sympy matplotlib

      - name: Build JupyterLite site
        run: |
          jupyter lite build --contents docs/notebooks --output-dir jupyterlite

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4