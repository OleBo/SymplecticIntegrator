version: '3.8'

services:
  symplectic-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: symplectic-integrator:latest
    container_name: symplectic-cpu
    volumes:
      - ./data:/app/data
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    command: bash

  symplectic-gpu:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    image: symplectic-integrator:gpu
    container_name: symplectic-gpu
    volumes:
      - ./data:/app/data
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    # Enable GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: bash

  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    image: symplectic-integrator:latest
    container_name: symplectic-notebook
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "pip install jupyter &&
               jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser
               --allow-root --NotebookApp.token='' --NotebookApp.password=''"
